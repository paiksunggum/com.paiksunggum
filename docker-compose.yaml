services:
  # FastAPI 백엔드
  api:
    build:
      context: ./paik        # FastAPI 폴더 위치
      dockerfile: Dockerfile
    ports:
      - "8000:8000"          # 내컴퓨터:8000 → 컨테이너:8000
    volumes:
      - ./paik:/app          # 코드 변경시 자동 반영
    env_file:
      - ./paik/.env
    environment:
      - ENABLE_API_DOCS=true
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgvector:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
      - OLLAMA_HOST=http://host.docker.internal:11434
      - N8N_WEBHOOK_URL=http://n8n:5678/webhook/paik-webhook
    depends_on:
      pgvector:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Next.js 프론트엔드
  web:
    build:
      context: ./www         # Next.js 폴더 위치
      dockerfile: Dockerfile
    ports:
      - "3000:3000"          # 내컴퓨터:3000 → 컨테이너:3000
    volumes:
      - ./www:/app
      - web_node_modules:/app/node_modules
    env_file:
      - ./paik/.env          # GEMINI_API_KEY 등 공유 키
    environment:
      - CI=true
      - BACKEND_URL=http://api:8000  # Docker 내부 네트워크로 FastAPI 연결
    depends_on:
      api:
        condition: service_healthy  # api 헬스체크 통과 후 web 실행

  # PostgreSQL + pgvector
  pgvector:
    image: pgvector/pgvector:pg17
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Redis
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Graph DB
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p \"$(echo $$NEO4J_AUTH | cut -d/ -f2)\" 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Vector DB
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"   # REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # n8n 워크플로우 자동화
  n8n:
    image: n8nio/n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  web_node_modules:
  n8n_data:
  pgvector_data:
  redis_data:
  neo4j_data:
  qdrant_data:
